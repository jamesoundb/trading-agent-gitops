apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trading-agent
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    repoURL: https://github.com/jamesoundb/trading-agent-gitops.git
    targetRevision: main
    # Base manifests are DRY_RUN-neutral. To go live, point at overlays/prod
    # (sets DRY_RUN=false) ONLY after validation — see overlays/prod/kustomization.yaml.
    path: manifests

  destination:
    server: https://kubernetes.default.svc
    namespace: trading

  syncPolicy:
    # MANUAL sync for trading — never auto-deploy live trading changes.
    # The `automated:` block is intentionally absent: ArgoCD will show OutOfSync
    # and wait for an explicit `argocd app sync trading-agent` / UI sync.
    syncOptions:
      - CreateNamespace=true

    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
