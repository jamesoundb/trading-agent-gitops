apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: trading

bases:
  - ../../manifests

# Prod environment: DRY_RUN=false for live trading
# Warning: Only set DRY_RUN=false in Secret after extensive validation!

patchesJson6902:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: trading-agent
      namespace: trading
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/resources/limits/memory
        value: "1Gi"

commonLabels:
  environment: prod
  dry-run: "false"
