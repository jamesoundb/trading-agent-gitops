apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: trading

resources:
  - ../../manifests

# Prod environment: DRY_RUN=false for live trading
# Warning: Only set DRY_RUN=false in Secret after extensive validation!

patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: trading-agent
      namespace: trading
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/template/spec/containers/0/resources/limits/memory
        value: "1Gi"

labels:
  - pairs:
      environment: prod
      dry-run: "false"
    includeSelectors: false
