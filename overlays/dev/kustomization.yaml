apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: trading

resources:
  - ../../manifests

# Dev environment: DRY_RUN=true for paper trading
patches:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: trading-agent
      namespace: trading
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1

labels:
  - pairs:
      environment: dev
      dry-run: "true"
    includeSelectors: false
