apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: trading

bases:
  - ../../manifests

# Dev environment: DRY_RUN=true for paper trading
patchesJson6902:
  - target:
      group: apps
      version: v1
      kind: Deployment
      name: trading-agent
      namespace: trading
    patch: |-
      - op: replace
        path: /spec/replicas
        value: 1

commonLabels:
  environment: dev
  dry-run: "true"
